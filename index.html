<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu Bella Napoli</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url('sfondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #fff;
    }
    .flag-btn {
      width: 100px; /* Leggermente più grandi per riempire meglio la griglia */
      height: auto;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .flag-btn:hover {
      transform: scale(1.1);
    }
    .logo {
      max-width: 250px;
      height: auto;
    }
    .overlay {
      background-color: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 15px;
      max-width: 400px; /* Limita la larghezza per tenere le bandiere vicine */
    }
    /* Rimuove lo spazio extra dalle colonne della griglia */
    .row > [class^="col-"] {
      padding: 15px;
    }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100 text-center">

  <div class="overlay">
    <img src="logo.jpg" alt="Logo" class="logo mb-4">

    <div class="mb-4">
      <h4>Scegli il tuo menù</h4>
      <h6>Choose your menu | Wähle dein Menü</h6>
      <h5>Válaszd ki a menüt</h5>
    </div>

    <div class="container">
      <div class="row row-cols-2 g-3">
        <div class="col">
          <a href="menu-it.pdf" download>
            <img src="https://flagcdn.com/w160/it.png" alt="Italiano" class="flag-btn">
          </a>
        </div>
        <div class="col">
          <a href="menu-en.pdf" download>
            <img src="https://flagcdn.com/w160/gb.png" alt="English" class="flag-btn">
          </a>
        </div>
        <div class="col">
          <a href="menu-de.pdf" download>
            <img src="https://flagcdn.com/w160/de.png" alt="Deutsch" class="flag-btn">
          </a>
        </div>
        <div class="col">
          <a href="menu-hu.pdf" download>
            <img src="https://flagcdn.com/w160/hu.png" alt="Magyar" class="flag-btn">
          </a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
